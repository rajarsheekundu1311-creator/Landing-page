<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Insurance Quotes</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    text-align: center;
}

h1 {
    color: #1e3c72;
}

.sub {
    color: #555;
    margin-bottom: 20px;
}

.call-btn {
    background: #e74c3c;
    color: white;
    padding: 15px;
    font-size: 18px;
    border-radius: 5px;
    text-decoration: none;
    display: block;
    margin: 15px 0;
}

.form input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
}

button {
    background: #27ae60;
    color: white;
    padding: 15px;
    border: none;
    width: 100%;
}

.benefits {
    text-align: left;
    margin: 20px 0;
}

.footer {
    font-size: 12px;
    color: #888;
}
</style>
</head>

<body>

<div class="container">

<h1>Save Up to 40% on Auto Insurance</h1>

<p class="sub">Compare quotes from top providers instantly.</p>

<a href="tel:+1234567890" class="call-btn">📞 Call Now for Free Quote</a>

<div class="benefits">
<p>✔ Save up to 40%</p>
<p>✔ Instant comparison</p>
<p>✔ No obligation</p>
<p>✔ Fast approval</p>
</div>

<form class="form">
<input type="text" placeholder="ZIP Code" required>
<input type="text" placeholder="Full Name" required>
<input type="tel" placeholder="Phone Number" required>
<input type="text" placeholder="Vehicle Type" required>

<button type="submit">Get My Free Quote</button>
</form>

<p class="footer">
Not affiliated with any government agency. Terms apply.
</p>

</div>

</body>
</html>
